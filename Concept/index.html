<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>git-github</title>
    <style>
      * {
        margin: 0%;
        padding: 0%;
        box-sizing: border-box;
      }
      body {
        width: 100%;
        height: 100%;
        background-color: grey;
      }
      .container {
        max-width: 95vw;
        height: 100vh;
        margin: 0 auto;
        background-color: rgb(110, 154, 190);
        display: flex;
        gap: 4rem;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }
      .item {
        width: 300px;
        height: 150px;
        padding: 10px;
        border-radius: 10px;
        background-color: rgb(18, 108, 197);
        filter: blur(20%);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
      }
      #butt {
        width: 70px;
        font-size: larger;
        background-color: rgb(18, 108, 197);
        border: none;
      }
      .upar {
        text-align: center;
        border-radius: 20px;
        border-bottom-left-radius: 50px;
        position: relative;
        background-color: rgb(214, 211, 18);
        border: 2px solid black;
        padding: 10px;
        animation-name: dabba;
        animation-duration: 3s;
        animation-iteration-count: infinite;
        animation-timing-function: ease-in;
        animation-direction: alternate;
      }
      @keyframes dabba {
        from {
          top: 0;
          left: 100px;
        }
        to {
          left: -100px;
          top: 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="upar">
        <h1 style="font-family: cursive">CODEE-Code</h1>
        <h2 style="font-family: cursive">Login Page</h2>
      </div>
      <form>
        <div class="item">
          <input
            type="email"
            id="mail"
            placeholder="Email Address"
            style="
              border-radius: 10px;
              padding: 7px;
              margin: 2px;
              border-color: rgb(255, 255, 255);
              width: 270px;
              height: 100px;
            "
          />

          <input
            type="password"
            id="pass"
            placeholder="Password"
            style="
              border-radius: 10px;
              padding: 7px;
              margin: 2px;
              border-color: rgb(246, 239, 239);
              width: 270px;
              height: 100px;
            "
          />
          <button id="butt">Login</button>
        </div>
      </form>
    </div>
    <!-- This comment is for me  -->
    <h1>hii</h1>
    <p>this is para</p>
    <p>ok my name</p>
  </body>
</html>
